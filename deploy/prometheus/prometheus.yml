# NATS /varz (metrics_path below) is JSON, not Prometheus text format, so
# scraping the servers directly fails ("expected label name" parse errors,
# confirmed live). Scrape the natsio/prometheus-nats-exporter sidecars
# instead (see docker-compose.generated.yml's <dot>-<tier>-exporter
# services), which translate /varz to real Prometheus format on
# :7777/metrics.
#
# Targets are NOT hardcoded here: this file is static (committed), but the
# fleet's exporter/sink set is generated (tools/gen-compose renders 9
# exporters + 4 sinks across mardot/veldot/sabdot). Instead, targets come from
# file_sd_configs reading targets.generated.json (mounted into the
# container by docker-compose.yml's prometheus service; regenerated by
# `make gen-compose`). That file holds two target groups, each carrying its
# own "job" label ("nats" / "sinks") — a discovered target's own "job"
# label wins over this scrape config's job_name default, so one
# scrape_config covers both jobs without double-scraping.
global: { scrape_interval: 15s }
scrape_configs:
  - job_name: generated
    file_sd_configs:
      - files: ["/etc/prometheus/targets.generated.json"]
