name: vikasa-demo
# Shared infra only: clickhouse/grafana/prometheus/migrate. Every
# DOT/cabinet-specific service (NATS tiers, NATS exporter sidecars, cabinet
# leaves, sims, stream-init jobs, sinks) is rendered by tools/gen-compose
# from deploy/topology/fleet.yaml into the gitignored
# docker-compose.generated.yml (`make gen-compose`); the two files are
# always used together via COMPOSE_ALL (see Makefile), but this file alone
# must also stay `docker compose config`-valid on its own (no depends_on
# pointing at a generated-file service) so single-file ops like
# `docker compose -f docker-compose.yml restart grafana` keep working.
# `vikasa` is the shared WAN-side network (regional/central/dmz + every
# leaf's uplink); each cabinet's private LAN network (`<cabinet-id>-net`,
# leaf-to-sim only) is declared in the generated file. See
# docker-compose.generated.yml's own header comment for the
# per-cabinet-network WAN-cut pattern.
networks: { vikasa: {} }

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    networks: [vikasa]
    ports: ["8123:8123", "9000:9000"]
    environment: { CLICKHOUSE_SKIP_USER_SETUP: "1" }
    healthcheck: { test: ["CMD", "clickhouse-client", "-q", "SELECT 1"], interval: 5s, retries: 20 }
    volumes:
      # Read-only `ai_readonly` user (Task 19's AI segment: the MCP
      # ClickHouse server connects as this user, never the default admin
      # user) -- readonly=1 + max_execution_time=30 in its profile, enforced
      # server-side so a runaway or mutating AI-generated query can't do
      # damage or hang. See deploy/clickhouse/users.d/ai-readonly.xml.
      - ../clickhouse/users.d/ai-readonly.xml:/etc/clickhouse-server/users.d/ai-readonly.xml:ro

  # Applies deploy/clickhouse/migrations/*.sql + seed.generated.sql against
  # the running clickhouse service. Deliberately NOT wired via ClickHouse's
  # docker-entrypoint-initdb.d (that mechanism only runs top-level *.sql/*.sh
  # on first container init, ignores the migrations/ subdir, and would run
  # our seed twice — once via initdb.d and once via this service). Migrations
  # apply exactly once per invocation of this service; all DDL is
  # `IF NOT EXISTS` so re-running is safe.
  migrate:
    image: clickhouse/clickhouse-server:25.8
    networks: [vikasa]
    depends_on:
      clickhouse:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/migrations/apply-migrations.sh"]
    environment: { CH_HOST: clickhouse }
    volumes:
      - ../clickhouse:/migrations:ro
    restart: "no"

  grafana:
    image: grafana/grafana:13.1.0
    networks: [vikasa]
    ports: ["3000:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro

  # NATS /varz is JSON, not Prometheus text format, so prometheus.yml can't
  # scrape the servers directly (confirmed live: scrape errors "expected
  # label name"). One natsio/prometheus-nats-exporter sidecar per tier
  # server translates /varz to Prometheus format on :7777/metrics; all 9
  # (3 DOTs x {regional,central,dmz}) are generated by tools/gen-compose
  # into docker-compose.generated.yml, alongside the servers they scrape —
  # they used to live here (gdot only) with a depends_on into the generated
  # file, which made this static file invalid standalone. Prometheus itself
  # discovers every exporter + sink target via the file-SD targets file
  # gen-compose also generates (targets.generated.json, mounted below), so
  # prometheus.yml needs no per-DOT edits either.
  prometheus:
    image: prom/prometheus:v3.13.1
    networks: [vikasa]
    ports: ["9090:9090"]
    volumes:
      - "../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "../prometheus/targets.generated.json:/etc/prometheus/targets.generated.json:ro"
